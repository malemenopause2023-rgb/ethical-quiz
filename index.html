<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>エシカルクイズ</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans JP', sans-serif; background: linear-gradient(160deg,#0a2e1a 0%,#0d3d2a 40%,#0a2a3d 100%); min-height: 100vh; padding: 16px; display: flex; align-items: flex-start; justify-content: center; }
    .container { max-width: 500px; width: 100%; padding-top: 16px; padding-bottom: 48px; }
    .earth-wrap { text-align: center; margin-bottom: 8px; }
    .earth { font-size: 4rem; display: inline-block; animation: rotate 8s linear infinite; }
    @keyframes rotate { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }
    .card { background: rgba(255,255,255,0.05); backdrop-filter: blur(12px); border-radius: 20px; padding: 28px 24px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); border: 1px solid rgba(100,200,120,0.2); }
    .badge { display: inline-block; background: linear-gradient(135deg,#1a7a3a,#2ecc71); color: white; font-size: 0.72rem; font-weight: 700; padding: 4px 14px; border-radius: 99px; margin-bottom: 14px; letter-spacing: 0.08em; }
    h1 { font-size: 1.6rem; font-weight: 900; color: #e8f5e9; margin-bottom: 8px; line-height: 1.4; }
    .desc { font-size: 0.85rem; color: #81c784; line-height: 1.8; margin-bottom: 20px; }
    .info-box { background: rgba(46,204,113,0.08); border: 1px solid rgba(46,204,113,0.2); border-radius: 12px; padding: 14px; margin-bottom: 16px; }
    .info-box-title { font-size: 0.78rem; font-weight: 700; color: #2ecc71; margin-bottom: 8px; }
    .info-box-body { font-size: 0.83rem; color: #81c784; line-height: 1.9; }
    .start-btn { width: 100%; padding: 18px; background: linear-gradient(135deg,#1a7a3a,#2ecc71); color: white; border: none; border-radius: 12px; font-family: 'Noto Sans JP', sans-serif; font-size: 1rem; font-weight: 900; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 20px rgba(46,204,113,0.3); }
    .start-btn:hover { transform: translateY(-2px); }
    .progress-wrap { margin-bottom: 20px; }
    .progress-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .progress-label { font-size: 0.78rem; color: #2ecc71; font-weight: 700; }
    .progress-cat { font-size: 0.72rem; color: #81c784; background: rgba(46,204,113,0.1); padding: 2px 10px; border-radius: 99px; }
    .progress-bar { background: rgba(0,0,0,0.3); border-radius: 99px; height: 6px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg,#1a7a3a,#2ecc71); border-radius: 99px; transition: width 0.4s ease; }
    .question-block { background: rgba(255,255,255,0.04); border-radius: 14px; padding: 20px; border: 1px solid rgba(100,200,120,0.15); }
    .q-num { font-size: 0.72rem; color: #2ecc71; font-weight: 700; margin-bottom: 8px; letter-spacing: 0.08em; }
    .q-text { font-size: 1rem; font-weight: 700; color: #e8f5e9; line-height: 1.7; margin-bottom: 18px; }
    .choices { display: flex; flex-direction: column; gap: 10px; }
    .choice-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(100,200,120,0.2); border-radius: 10px; padding: 14px 16px; font-family: 'Noto Sans JP', sans-serif; font-size: 0.9rem; color: #a5d6a7; cursor: pointer; transition: all 0.18s; text-align: left; width: 100%; }
    .choice-btn:hover { background: rgba(46,204,113,0.1); border-color: #2ecc71; color: #e8f5e9; }
    .choice-btn.correct { background: rgba(46,204,113,0.2); border-color: #2ecc71; color: #2ecc71; font-weight: 700; }
    .choice-btn.wrong { background: rgba(231,76,60,0.15); border-color: #e74c3c; color: #e74c3c; font-weight: 700; }
    .choice-btn.disabled { cursor: not-allowed; pointer-events: none; }
    .feedback { margin-top: 14px; padding: 12px 16px; border-radius: 10px; font-size: 0.88rem; font-weight: 700; display: none; }
    .feedback.correct { background: rgba(46,204,113,0.15); color: #2ecc71; border: 1px solid rgba(46,204,113,0.3); }
    .feedback.wrong { background: rgba(231,76,60,0.12); color: #e74c3c; border: 1px solid rgba(231,76,60,0.3); }
    .result-earth { text-align: center; font-size: 5rem; margin: 16px 0; animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
    .result-grade { text-align: center; font-size: 5rem; font-weight: 900; margin: 8px 0; }
    .grade-A{color:#2ecc71;} .grade-B{color:#27ae60;} .grade-C{color:#f1c40f;}
    .grade-D{color:#e67e22;} .grade-E{color:#e74c3c;} .grade-F{color:#c0392b;} .grade-G{color:#7f8c8d;}
    .result-label { text-align: center; font-size: 1rem; font-weight: 700; color: #81c784; margin-bottom: 8px; }
    .result-message { text-align: center; font-size: 0.95rem; font-weight: 700; color: #e8f5e9; margin-bottom: 20px; padding: 12px; background: rgba(46,204,113,0.08); border-radius: 10px; border: 1px solid rgba(46,204,113,0.15); }
    .score-box { background: rgba(46,204,113,0.08); border: 1px solid rgba(46,204,113,0.2); border-radius: 12px; padding: 16px; text-align: center; margin-bottom: 16px; }
    .score-num { font-size: 2.5rem; font-weight: 900; color: #e8f5e9; }
    .score-sub { font-size: 0.85rem; color: #81c784; margin-top: 4px; }
    .comment-box { background: rgba(255,255,255,0.04); border: 1px solid rgba(100,200,120,0.15); border-radius: 12px; padding: 16px; font-size: 0.88rem; color: #a5d6a7; line-height: 1.9; white-space: pre-wrap; margin-bottom: 16px; }
    .wrong-list { margin-bottom: 16px; }
    .wrong-list-title { font-size: 0.85rem; font-weight: 700; color: #e74c3c; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid rgba(231,76,60,0.3); }
    .wrong-item { background: rgba(231,76,60,0.08); border: 1px solid rgba(231,76,60,0.2); border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; }
    .wrong-item-q { font-size: 0.85rem; color: #e8f5e9; font-weight: 700; margin-bottom: 6px; line-height: 1.5; }
    .wrong-item-a { font-size: 0.82rem; color: #2ecc71; }
    .retry-btn { width: 100%; padding: 16px; background: transparent; color: #2ecc71; border: 1px solid #2ecc71; border-radius: 12px; font-family: 'Noto Sans JP', sans-serif; font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: all 0.2s; }
    .retry-btn:hover { background: rgba(46,204,113,0.1); }
    .note { font-size: 0.75rem; color: rgba(129,199,132,0.5); text-align: center; margin-top: 14px; line-height: 1.6; }
    .loading-wrap { text-align: center; padding: 40px 0; }
    .loading-icon { font-size: 3rem; display: block; margin-bottom: 12px; animation: spin 1.2s linear infinite; }
    @keyframes spin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }
    .loading-text { color: #2ecc71; font-weight: 700; letter-spacing: 0.1em; font-size: 0.9rem; }
  </style>
</head>
<body>
<div class="container">

  <!-- TOP -->
  <div id="screen-top" class="card">
    <div class="earth-wrap"><span class="earth">🌍</span></div>
    <div class="badge">ETHICAL QUIZ</div>
    <h1>エシカルクイズ</h1>
    <p class="desc">様々なカテゴリーから20問がランダムに出題されます。あなたのエシカルレベルを診断しましょう！</p>
    <div class="info-box">
      <div class="info-box-title">📋 クイズについて</div>
      <div class="info-box-body">
        出題数：20問（50問からランダム）<br>
        形式：3択クイズ<br>
        判定：エシカルレベル A〜G
      </div>
    </div>
    <p class="note">※結果は匿名で記録されます。</p>
    <button class="start-btn" id="start-btn">クイズをはじめる 🌱</button>
  </div>

  <!-- QUIZ -->
  <div id="screen-quiz" class="card" style="display:none">
    <div class="progress-wrap">
      <div class="progress-top">
        <div class="progress-label" id="q-progress">問題 1 / 20</div>
        <div class="progress-cat" id="q-cat">-</div>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    </div>
    <div class="question-block">
      <div class="q-num" id="q-num">Q1</div>
      <div class="q-text" id="q-text"></div>
      <div class="choices" id="choices"></div>
      <div class="feedback" id="feedback"></div>
    </div>
  </div>

  <!-- LOADING -->
  <div id="screen-loading" class="card" style="display:none">
    <div class="loading-wrap">
      <span class="loading-icon">🌍</span>
      <div class="loading-text">エシカルレベルを診断中...</div>
    </div>
  </div>

  <!-- RESULT -->
  <div id="screen-result" class="card" style="display:none">
    <div class="badge">RESULT</div>
    <h1>診断結果</h1>
    <div class="result-earth" id="result-earth">🌍</div>
    <div class="result-grade" id="result-grade">-</div>
    <div class="result-label" id="result-label">-</div>
    <div class="result-message" id="result-message"></div>
    <div class="score-box">
      <div class="score-num"><span id="result-score">0</span><span style="font-size:1.2rem;color:#81c784;"> / 20問正解</span></div>
      <div class="score-sub" id="result-percent">正解率 0%</div>
    </div>
    <div class="comment-box" id="result-comment"></div>
    <div class="wrong-list" id="wrong-list"></div>
    <p class="note">※このクイズは学習・啓発を目的としています。</p>
    <button class="retry-btn" id="retry-btn">もう一度チャレンジ 🔄</button>
  </div>

</div>

<script src="questions.js"></script>
<script>
const QUIZ_COUNT = 20;
const AUTO_NEXT_DELAY = 1200; // 正解時の自動送り（ミリ秒）
const AUTO_NEXT_DELAY_WRONG = 2000; // 不正解時の自動送り（ミリ秒）

const grades = [
  { min: 95, grade: 'A', label: 'エシカルマスター 🌟', earth: '🌍', message: '地球は今日も美しく輝いています。', comment: '素晴らしい！地球と社会への深い理解をお持ちです。\nあなたの行動が世界をより良くしています。\nぜひ周りの人にも伝えていきましょう！' },
  { min: 80, grade: 'B', label: 'エシカルリーダー 🌿', earth: '🌏', message: '地球はまだ緑豊かです。あと少しの行動で完璧！', comment: 'とても良い結果です！エシカルな知識が身についています。\nあと少しの学びでさらに深い理解に到達できます。\n日々の選択を意識し続けましょう！' },
  { min: 65, grade: 'C', label: 'エシカル実践者 🌱', earth: '🌐', message: '地球の一部で環境ストレスが始まっています。', comment: '平均以上の知識があります！\n基本的なエシカルの考え方は理解できています。\nさらに学びを深めて行動に移していきましょう。' },
  { min: 50, grade: 'D', label: 'エシカル学習者 📚', earth: '🏔️', message: '緑が減り始めています。学びを深めていきましょう。', comment: 'エシカルな考え方を学び始めているあなた。\n身近なところから少しずつ意識を変えていきましょう。\nフェアトレード商品を選ぶことから始めてみませんか？' },
  { min: 35, grade: 'E', label: 'エシカル入門者 🌾', earth: '🏜️', message: 'このままでは将来、地球は砂漠化します。', comment: 'まだ学びの余地がたくさんあります。\nエシカルな消費・環境問題・人権について\n少しずつ知識を増やしていきましょう！' },
  { min: 20, grade: 'F', label: 'エシカル初心者 🌵', earth: '🏜️', message: '地球の砂漠化が急速に進んでいます。今すぐ行動を！', comment: '今日からエシカルを学び始めましょう！\n地球や社会のことを知ることで、\n日常の買い物や行動が変わっていきます。' },
  { min: 0,  grade: 'G', label: 'エシカル未経験 🪨', earth: '🏜️', message: '地球は砂漠と化しています。一緒に学び始めましょう！', comment: 'エシカルという言葉を知るところから始めましょう。\n私たちの消費行動は地球や社会とつながっています。\nまず身近なフェアトレードコーヒーを試してみませんか？' },
];

let quizQuestions = [];
let currentIndex = 0;
let score = 0;
let wrongList = [];
let answered = false;

function showScreen(id) {
  document.querySelectorAll('.card').forEach(c => c.style.display = 'none');
  document.getElementById(id).style.display = 'block';
  window.scrollTo(0, 0);
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz() {
  quizQuestions = shuffle(questions).slice(0, QUIZ_COUNT);
  currentIndex = 0;
  score = 0;
  wrongList = [];
  showScreen('screen-quiz');
  showQuestion();
}

function showQuestion() {
  answered = false;
  const q = quizQuestions[currentIndex];
  const pct = (currentIndex / QUIZ_COUNT) * 100;

  document.getElementById('q-progress').textContent = `問題 ${currentIndex + 1} / ${QUIZ_COUNT}`;
  document.getElementById('q-cat').textContent = q.category;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('q-num').textContent = `Q${currentIndex + 1}`;
  document.getElementById('q-text').textContent = q.q;

  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  q.choices.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = c;
    btn.addEventListener('click', () => selectAnswer(i));
    choicesEl.appendChild(btn);
  });

  document.getElementById('feedback').style.display = 'none';
}

function selectAnswer(index) {
  if (answered) return;
  answered = true;

  const q = quizQuestions[currentIndex];
  const btns = document.querySelectorAll('.choice-btn');
  const feedback = document.getElementById('feedback');

  btns.forEach(b => b.classList.add('disabled'));

  let delay = AUTO_NEXT_DELAY;

  if (index === q.answer) {
    score++;
    btns[index].classList.add('correct');
    feedback.textContent = '✅ 正解！';
    feedback.className = 'feedback correct';
    delay = AUTO_NEXT_DELAY;
  } else {
    btns[index].classList.add('wrong');
    btns[q.answer].classList.add('correct');
    feedback.textContent = `❌ 不正解。正解は「${q.choices[q.answer]}」`;
    feedback.className = 'feedback wrong';
    wrongList.push({ q: q.q, correct: q.choices[q.answer] });
    delay = AUTO_NEXT_DELAY_WRONG;
  }
  feedback.style.display = 'block';

  // 自動で次へ
  setTimeout(() => {
    currentIndex++;
    if (currentIndex >= QUIZ_COUNT) {
      showResult();
    } else {
      showQuestion();
    }
  }, delay);
}

async function showResult() {
  showScreen('screen-loading');

  const pct = Math.round((score / QUIZ_COUNT) * 100);
  const gradeInfo = grades.find(g => pct >= g.min) || grades[grades.length - 1];

  await fetch('/api/save-quiz', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ score, total: QUIZ_COUNT, percent: pct, grade: gradeInfo.grade })
  });

  setTimeout(() => {
    document.getElementById('result-earth').textContent = gradeInfo.earth;
    document.getElementById('result-grade').textContent = gradeInfo.grade;
    document.getElementById('result-grade').className = `result-grade grade-${gradeInfo.grade}`;
    document.getElementById('result-label').textContent = gradeInfo.label;
    document.getElementById('result-message').textContent = gradeInfo.message;
    document.getElementById('result-score').textContent = score;
    document.getElementById('result-percent').textContent = `正解率 ${pct}%`;
    document.getElementById('result-comment').textContent = gradeInfo.comment;

    // 不正解一覧
    const wrongEl = document.getElementById('wrong-list');
    if (wrongList.length > 0) {
      wrongEl.innerHTML = `<div class="wrong-list-title">❌ 不正解だった問題（${wrongList.length}問）</div>`
        + wrongList.map(w =>
          `<div class="wrong-item">
            <div class="wrong-item-q">Q. ${w.q}</div>
            <div class="wrong-item-a">✅ 正解：${w.correct}</div>
          </div>`
        ).join('');
    } else {
      wrongEl.innerHTML = '<div style="text-align:center;color:#2ecc71;font-weight:700;padding:12px;">🎉 全問正解！素晴らしい！</div>';
    }

    showScreen('screen-result');
  }, 1500);
}

document.getElementById('start-btn').addEventListener('click', startQuiz);
document.getElementById('retry-btn').addEventListener('click', startQuiz);
</script>
</body>
</html>
